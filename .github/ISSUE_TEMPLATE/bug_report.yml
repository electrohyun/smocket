name: Bug report
description: Report incorrect delivery behavior or an API issue
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: A minimal code snippet that shows the problem.
      render: ts
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: smocket version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node version and test runner.
      placeholder: Node 22, vitest 3
    validations:
      required: true
